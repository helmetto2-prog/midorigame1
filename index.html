<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>グラディウス風 シューティング スマホ版</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; }
  body { background:#05060f; display:flex; flex-direction:column; align-items:center; justify-content:center;
         min-height:100vh; font-family:'Segoe UI','MS PGothic',sans-serif;
         overflow:hidden; touch-action:none; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }
  canvas { display:block; box-shadow:0 0 40px rgba(120,150,255,0.3); border-radius:8px;
           max-width:99vw; max-height:74vh; touch-action:none; }
  #pad { display:flex; gap:10px; align-items:center; justify-content:center; margin-top:8px; flex-wrap:wrap; }
  #pad button { font-family:inherit; font-weight:800; color:#dce8ff; background:#19223e;
                border:1px solid #38507e; border-radius:12px; padding:12px 16px; font-size:15px;
                box-shadow:0 2px 8px rgba(0,0,0,.4); touch-action:manipulation; cursor:pointer; }
  #pad button:active { background:#26345c; transform:translateY(1px); }
  #pad .pow { background:#7a3bd6; border-color:#a06bff; color:#fff; font-size:16px; padding:12px 22px; }
  #pad .mini { padding:12px 14px; font-size:18px; }
  #hint { color:#8aa; font-size:12px; margin-top:8px; text-align:center; padding:0 8px; line-height:1.6; }
  #hint b { color:#bdd; }
</style>
</head>
<body>
<canvas id="c" width="900" height="600"></canvas>
<div id="pad">
  <button id="btnPow" class="pow">⚡ パワーUP</button>
  <button id="btnPause" class="mini" title="ポーズ">⏸</button>
  <button id="btnSound" class="mini" title="音">♪</button>
  <button id="btnRestart" class="mini" title="やり直し">↻</button>
</div>
<div id="hint">📱 スマホ：画面を<b>ドラッグして移動</b>（自動で連射）／敵が落とす「P」を取り<b>⚡パワーUP</b>で装備発動<br>
💻 PC：← ↑ → ↓ / WASD 移動 ・ Space ショット ・ Z 発動 ・ P ポーズ ・ M 音 ・ R リスタート</div>

<script>
'use strict';
/* =========================================================================
   ENGINE
   ========================================================================= */
const C = document.getElementById('c'), ctx = C.getContext('2d');
const W = C.width, H = C.height;
const clock = () => performance.now();
const clamp = (v,a,b) => v<a?a:v>b?b:v;
const randi = n => Math.random()*n|0;
const rngPick = arr => arr[randi(arr.length)];
const TAU = 6.2831853;

let state = 'title';
let G = null;

const Input = (function(){
  const keys = new Set();
  const edge = new Set();
  const BLOCK = ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'];
  document.addEventListener('keydown', e => {
    SFX.ensure();
    if (BLOCK.includes(e.code)) e.preventDefault();
    if (!keys.has(e.code)) edge.add(e.code);
    keys.add(e.code);
    onKey(e.code);
  });
  document.addEventListener('keyup', e => keys.delete(e.code));
  C.addEventListener('click', () => { SFX.ensure(); if (state==='title'||state==='over') startGame(); });
  return { held: code => keys.has(code), pressed: code => edge.has(code), clearEdges: () => edge.clear() };
})();

const SFX = (function(){
  let ac=null, master=null, on=true;
  let bgmIv=null, bgmStep=0, bgmMode='play';
  const midi = n => 440*Math.pow(2,(n-69)/12);
  function tone(f,d,type,v){ if(!ac) return; const t=ac.currentTime+0.01, o=ac.createOscillator(), g=ac.createGain();
    o.type=type; o.frequency.value=f; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(v,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0006,t+d); o.connect(g).connect(master); o.start(t); o.stop(t+d+0.03); }
  function slide(f0,f1,d,type,v){ if(!ac) return; const t=ac.currentTime+0.01, o=ac.createOscillator(), g=ac.createGain();
    o.type=type; o.frequency.setValueAtTime(f0,t); o.frequency.exponentialRampToValueAtTime(f1,t+d);
    g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(0.0006,t+d); o.connect(g).connect(master); o.start(t); o.stop(t+d+0.03); }
  function noise(v,freq,d){ if(!ac) return; const t=ac.currentTime+0.01, b=ac.createBuffer(1,2048,ac.sampleRate), dt=b.getChannelData(0);
    for(let i=0;i<dt.length;i++) dt[i]=Math.random()*2-1; const s=ac.createBufferSource(); s.buffer=b;
    const f=ac.createBiquadFilter(); f.type='bandpass'; f.frequency.value=freq; const g=ac.createGain();
    g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(0.001,t+d); s.connect(f).connect(g).connect(master); s.start(t); s.stop(t+d+0.05); }
  // 内蔵BGM（自作チップチューン・32ステップ/約150ms）：通常曲stage（C長調・疾走）／ボス曲boss（A短調・緊張）
  const BGM = {
    stage: {
      lead: [72,76,79,76, 74,76,72,null, 71,74,79,74, 72,74,71,null,
             69,72,76,72, 71,72,69,null, 65,69,72,69, 67,69,65,null],
      bass: [48,null,55,null, 48,null,55,null, 55,null,50,null, 55,null,50,null,
             57,null,52,null, 57,null,52,null, 53,null,48,null, 53,null,48,null],
    },
    boss: {  // 鬼気迫る：半音多用・低音トライトーン・スネアで緊迫
      lead: [69,72,75,76, 75,72,69,68, 69,72,76,79, 78,76,72,69,
             71,74,77,80, 79,77,74,71, 80,79,77,76, 75,73,72,71],
      bass: [45,45,45,46, 45,45,45,44, 50,50,50,51, 50,50,50,49,
             52,52,52,53, 52,52,52,51, 45,45,48,46, 45,44,45,47],
    },
  };
  function bgmInterval(){ return bgmMode==='boss'?118:150; }   // ボスは速いテンポ
  function tickBGM(){ if(!ac) return; const boss=bgmMode==='boss', m=BGM[bgmMode]||BGM.stage, i=bgmStep%32;
    const L=m.lead[i], B=m.bass[i];
    if(B!=null) tone(midi(B-12), boss?0.16:0.20, 'triangle', boss?0.10:0.09);
    if(L!=null) tone(midi(L), 0.16, 'square', boss?0.055:0.05);
    if(boss){
      if(L!=null && i%2===0) tone(midi(L-12), 0.12, 'sawtooth', 0.04);                 // 唸るオクターブ下
      if(i%8===0){ tone(midi(33), 0.55, 'sawtooth', 0.05); tone(midi(39), 0.55, 'sawtooth', 0.035); } // 低音トライトーン(A1+D#2)
      if(i%4===2) noise(0.07, 2000, 0.04);                                              // スネア
      if(i%2===0) noise(0.03, 1100, 0.03);                                              // ハット
      if(i%8===0) noise(0.14, 150, 0.11);                                               // キック
    } else {
      if(i%8===0) noise(0.12, 220, 0.10);
      else if(i%2===0) noise(0.025, 1700, 0.03);
    }
    bgmStep=(bgmStep+1)%32;
  }
  return {
    get on(){ return on; },
    ensure(){ try{ if(!ac){ const A=window.AudioContext||window.webkitAudioContext; if(!A) return;
      ac=new A(); master=ac.createGain(); master.gain.value=on?0.22:0; master.connect(ac.destination); }
      if(ac.state==='suspended') ac.resume(); }catch(e){} },
    toggle(){ on=!on; if(master) master.gain.value=on?0.22:0; },
    startBGM(mode){ this.ensure(); this.stopBGM(); bgmMode=mode||'play'; bgmStep=0; if(ac) bgmIv=setInterval(tickBGM,bgmInterval()); },
    setBGMMode(mode){ if(mode===bgmMode) return; bgmMode=mode; if(bgmIv){ clearInterval(bgmIv); bgmIv=setInterval(tickBGM,bgmInterval()); } },
    stopBGM(){ if(bgmIv){ clearInterval(bgmIv); bgmIv=null; } },
    shoot(){ slide(900,420,0.08,'square',0.05); },
    laser(){ slide(1400,700,0.12,'sawtooth',0.05); },
    enemyShoot(){ slide(500,260,0.10,'sawtooth',0.04); },
    explode(){ noise(0.45,500,0.30); },
    bigExplode(){ noise(0.6,300,0.5); slide(200,60,0.4,'sawtooth',0.12); },
    powerget(){ tone(740,0.08,'square',0.06); },
    powerup(){ [72,76,79,84].forEach((m,i)=>setTimeout(()=>tone(midi(m),0.12,'square',0.10), i*55)); },
    fanfare(){ [60,64,67,72,76,79].forEach((m,i)=>setTimeout(()=>tone(midi(m),0.22,'square',0.11), i*130)); },
    hit(){ slide(300,80,0.25,'sawtooth',0.16); },
    lose(){ [67,63,60,55,48].forEach((m,i)=>setTimeout(()=>tone(midi(m),0.30,'sawtooth',0.14), i*150)); },
  };
})();

// タッチ操作：キャンバスをドラッグすると自機がその位置へ追従（スマホ用）
const Touch = (function(){
  let active=false, tx=120, ty=H/2;
  function toCanvas(e){ const r=C.getBoundingClientRect();
    return { x:(e.clientX-r.left)*(C.width/r.width), y:(e.clientY-r.top)*(C.height/r.height) }; }
  function set(e){ const q=toCanvas(e); tx=clamp(q.x,16,W*0.66); ty=clamp(q.y-46,16,H-36); }
  C.addEventListener('pointerdown', e=>{ SFX.ensure();
    if(state==='title'||state==='over') return;     // タイトル/ゲームオーバーでのタップ開始はclickハンドラに任せる
    active=true; set(e); try{ C.setPointerCapture(e.pointerId); }catch(_){ } e.preventDefault();
  }, {passive:false});
  C.addEventListener('pointermove', e=>{ if(active){ set(e); e.preventDefault(); } }, {passive:false});
  const end=()=>{ active=false; };
  C.addEventListener('pointerup', end);
  C.addEventListener('pointercancel', end);
  return { get active(){ return active; }, get x(){ return tx; }, get y(){ return ty; } };
})();

const FX = (function(){
  let parts=[], shake=0;
  return {
    burst(x,y,col,count,spd){ count=count||10; spd=spd||3.5; for(let i=0;i<count;i++){ const a=Math.random()*TAU, s=1+Math.random()*spd;
      parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,col:col||'#fff',life:0,dur:0.4+Math.random()*0.4}); } },
    shake(amt){ shake=Math.max(shake,amt); },
    update(dt){ const f=dt/16; for(const p of parts){ p.life+=dt/1000; p.x+=p.vx*f; p.y+=p.vy*f; p.vx*=0.96; p.vy*=0.96; }
      parts=parts.filter(p=>p.life<p.dur); shake=Math.max(0,shake-dt/16); },
    preDraw(){ if(shake>0){ ctx.save(); ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake); } },
    postDraw(){ for(const p of parts){ ctx.save(); ctx.globalAlpha=Math.max(0,1-p.life/p.dur);
      ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,2.5,0,TAU); ctx.fill(); ctx.restore(); } if(shake>0) ctx.restore(); },
    clear(){ parts=[]; shake=0; },
  };
})();

const Store = { key:'gradius_like_best', get(){ return +(localStorage.getItem(this.key)||0); }, set(v){ localStorage.setItem(this.key, v); } };

function clearBG(){ const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#0a0f24'); g.addColorStop(1,'#05060f'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); }
function overlay(title,col,sub,sub2){ ctx.fillStyle='rgba(0,0,0,0.66)'; ctx.fillRect(0,0,W,H); ctx.textAlign='center';
  ctx.fillStyle=col; ctx.font='bold 52px "Segoe UI"'; ctx.fillText(title,W/2,H/2-12);
  ctx.fillStyle='#cdd'; ctx.font='18px "Segoe UI"'; ctx.fillText(sub,W/2,H/2+34);
  if(sub2){ ctx.fillStyle='#8aa'; ctx.font='14px "Segoe UI"'; ctx.fillText(sub2,W/2,H/2+64); } }

let lastT=0;
function loop(t){ const dt = lastT ? Math.min(50, t-lastT) : 16; lastT=t;
  if (state==='play') update(dt);
  FX.update(dt); render(); Input.clearEdges(); requestAnimationFrame(loop); }

/* =========================================================================
   ==== GAME ====  グラディウス風 v05
   ========================================================================= */
const CONFIG = {
  baseSpeed:0.26, speedStep:0.055, maxSpeed:4,
  bulletSpeed:0.72, laserSpeed:1.15, ebulletSpeed:0.30, bossBulletSpeed:0.28,
  capSpeed:0.08, startLives:3, invulnMs:1600, zoneX:0.66,
  fireInterval:160, laserInterval:220, missileInterval:500,
  maxOptions:4, stageDuration:30000, warnMs:1700, interMs:2800,
};
Store.key = 'gradius_like_best';

const SLOTS = ['SPEED UP','MISSILE','DOUBLE','LASER','OPTION'];
const SLOT_SHORT = ['SPEED','MISSILE','DOUBLE','LASER','OPTION'];
const BOSS_KINDS = [
  { r:60, col:'#4a3b6e', core:'#ff4d6d', hp:80, name:'狙撃要塞' },
  { r:54, col:'#33586e', core:'#39d0ff', hp:96, name:'拡散ツイン' },
  { r:64, col:'#6e3b4a', core:'#ffd23f', hp:112, name:'回転リング' },
];
// 裏コマンド（コナミコマンド）：↑↑↓↓←→←→ A B
const KONAMI = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','KeyA','KeyB'];
let konamiIdx = 0;

function makeStars(){ const s=[]; for(let i=0;i<130;i++) s.push({ x:Math.random()*W, y:Math.random()*H, spd:0.02+Math.random()*0.18, sz:Math.random()<0.8?1:2 }); return s; }

function newGame(){
  G = {
    p:{ x:120, y:H/2, r:12, cool:0, missileCool:0, invuln:0 },
    weapon:{ meter:-1, speed:0, missile:false, shot:'single', options:0 },
    trail:[],
    bullets:[], ebullets:[], missiles:[], enemies:[], caps:[], stars: makeStars(),
    score:0, lives:CONFIG.startLives, time:0, spawnT:700, flash:0,
    boss:null, stage:1, stageT:0, warnT:0, interT:0, win:false,
  };
}

// ---- 武器 ----
function spawnShot(x,y,w){
  if(w.shot==='laser'){ G.bullets.push({x:x+12,y,vx:CONFIG.laserSpeed,vy:0,dmg:2,r:7,laser:true}); }
  else if(w.shot==='double'){
    G.bullets.push({x,y,vx:CONFIG.bulletSpeed,vy:0,dmg:1,r:4});
    G.bullets.push({x,y,vx:CONFIG.bulletSpeed*0.85,vy:-0.42,dmg:1,r:4});
    G.bullets.push({x,y,vx:CONFIG.bulletSpeed*0.85,vy: 0.42,dmg:1,r:4});
  } else {
    G.bullets.push({x,y:y-5,vx:CONFIG.bulletSpeed,vy:0,dmg:1,r:4});
    G.bullets.push({x,y:y+5,vx:CONFIG.bulletSpeed,vy:0,dmg:1,r:4});
  }
}
function optionPositions(){ const arr=[]; for(let i=1;i<=G.weapon.options;i++){ const idx=Math.min(G.trail.length-1, i*13); const t=G.trail[idx]; if(t) arr.push(t); } return arr; }
function fireWeapons(){
  const p=G.p, w=G.weapon;
  spawnShot(p.x+14, p.y, w);
  for(const o of optionPositions()) spawnShot(o.x+10, o.y, w);
  if(w.shot==='laser') SFX.laser(); else SFX.shoot();
}
function fireMissile(){
  const p=G.p; G.missiles.push({x:p.x+6,y:p.y+4,vx:0.40,vy:0.28,grounded:false});
  for(const o of optionPositions()) G.missiles.push({x:o.x,y:o.y+4,vx:0.40,vy:0.28,grounded:false});
}
function activatePowerUp(){
  const w=G.weapon; if(w.meter<0) return;
  const slot=SLOTS[w.meter];
  if(slot==='SPEED UP'){ if(w.speed<CONFIG.maxSpeed) w.speed++; }
  else if(slot==='MISSILE'){ w.missile=true; }
  else if(slot==='DOUBLE'){ w.shot='double'; }
  else if(slot==='LASER'){ w.shot='laser'; }
  else if(slot==='OPTION'){ if(w.options<CONFIG.maxOptions) w.options++; }
  w.meter=-1; SFX.powerup(); FX.burst(G.p.x,G.p.y,'#7CFC00',14,3);
}
function applyMaxPower(){            // 裏コマンド：全パワーアップ
  const w=G.weapon; w.speed=CONFIG.maxSpeed; w.missile=true; w.shot='laser'; w.options=CONFIG.maxOptions; w.meter=-1;
  G.lives=Math.max(G.lives,5); G.p.invuln=Math.max(G.p.invuln,2000);
  state='play'; SFX.powerup(); SFX.fanfare(); FX.burst(G.p.x,G.p.y,'#ffd23f',36,6); FX.shake(10);
}

// ---- 敵 ----
function spawnEnemy(){
  const y=40+Math.random()*(H-120);
  const e={ x:W+24, y, baseY:y, t:0, fireT:600+randi(1100) };
  const r=Math.random();
  if(r<0.12)      Object.assign(e,{type:'carrier',col:'#ff4d6d',wing:'#a32338',r:16,hp:3,score:300,pattern:'sine',amp:30+randi(50),spd:0.085,carry:true});
  else if(r<0.26) Object.assign(e,{type:'fast',   col:'#ff9f1c',wing:'#a35e10',r:11,hp:1,score:150,pattern:'dive',  spd:0.22});
  else if(r<0.41) Object.assign(e,{type:'wave',   col:'#39d0ff',wing:'#1d6f8a',r:12,hp:1,score:100,pattern:'sine',  amp:44+randi(54),spd:0.13,shoots:Math.random()<0.4});
  else if(r<0.55) Object.assign(e,{type:'zako',   col:'#7ec8ff',wing:'#3a6a90',r:12,hp:1,score:80, pattern:'straight',spd:0.14,shoots:Math.random()<0.3});
  else if(r<0.68) Object.assign(e,{type:'zigzag', col:'#9be15a',wing:'#4a7a28',r:12,hp:1,score:120,pattern:'zigzag',amp:60+randi(40),spd:0.12,zvy:(Math.random()<0.5?0.16:-0.16)});
  else if(r<0.80) Object.assign(e,{type:'gunner', col:'#b06bff',wing:'#5a36a0',r:14,hp:2,score:200,pattern:'straight',spd:0.08,shoots:true,fireInt:1100});
  else if(r<0.91) Object.assign(e,{type:'spinner',col:'#ff5ad0',wing:'#a02080',r:13,hp:2,score:220,pattern:'straight',spd:0.07,shoots:true,fireInt:1300});
  else            Object.assign(e,{type:'bomber', col:'#c0c0d0',wing:'#5a5a72',r:19,hp:4,score:400,pattern:'straight',spd:0.06,shoots:true,fireInt:1500});
  e.spd *= 1 + (G.stage-1)*0.10 + Math.min(0.5, G.time/220000);
  G.enemies.push(e);
}
function enemyFire(e){
  const p=G.p, sp=CONFIG.ebulletSpeed;
  if(e.type==='spinner'){ const base=e.t*0.003; for(let i=0;i<5;i++){ const a=base+i/5*TAU; G.ebullets.push({x:e.x,y:e.y,vx:Math.cos(a)*sp*0.9,vy:Math.sin(a)*sp*0.9}); } }
  else if(e.type==='bomber'){ const aim=Math.atan2(p.y-e.y,p.x-e.x); for(let i=-1;i<=1;i++){ const a=aim+i*0.20; G.ebullets.push({x:e.x-e.r,y:e.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp}); } }
  else { const dx=p.x-e.x,dy=p.y-e.y,d=Math.hypot(dx,dy)||1; G.ebullets.push({ x:e.x-e.r, y:e.y, vx:dx/d*sp, vy:dy/d*sp }); }
  SFX.enemyShoot();
}
function hitC(ax,ay,ar,bx,by,br){ const dx=ax-bx,dy=ay-by,rr=ar+br; return dx*dx+dy*dy < rr*rr; }

function playerHit(){
  const p=G.p, w=G.weapon; if(p.invuln>0) return;
  G.lives--; FX.burst(p.x,p.y,'#ff6a4d',28,5); FX.shake(13); SFX.hit(); G.flash=180;
  if(w.options>0) w.options--; else if(w.shot!=='single') w.shot='single'; else if(w.speed>0) w.speed--; else if(w.missile) w.missile=false;
  w.meter=-1;
  if(G.lives<0){ gameOver(); return; }
  p.x=120; p.y=H/2; p.invuln=CONFIG.invulnMs;
}
function dropCapsule(x,y){ G.caps.push({x,y,t:0}); }
function killEnemy(e){
  e.dead=true; G.score+=e.score;
  FX.burst(e.x,e.y, e.col, e.type==='carrier'?22:14, e.type==='carrier'?5:4);
  if(e.type==='carrier'){ SFX.bigExplode(); dropCapsule(e.x,e.y); FX.shake(7); }
  else { SFX.explode(); FX.shake(3); if(Math.random()<0.14) dropCapsule(e.x,e.y); }
}

// ---- ボス（3種） ----
function startBoss(){ if(G.boss) return; const kind=(G.stage-1)%3, B=BOSS_KINDS[kind];
  const mh=B.hp + (G.stage-1)*40;
  G.boss={ x:W+100, y:H/2, tx:W-160, r:B.r, hp:mh, maxhp:mh, t:0, fireT:1100, enterDone:false, flash:0, shotN:0, kind, col:B.col, core:B.core, name:B.name };
  SFX.setBGMMode('boss');
}
function bossBullet(b,a,sp){ G.ebullets.push({ x:b.x-b.r*0.4, y:b.y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp }); }
function bossAttack(b){
  const p=G.p, ratio=b.hp/b.maxhp, sp=CONFIG.bossBulletSpeed, aim=Math.atan2(p.y-b.y,p.x-b.x); b.shotN++;
  if(b.kind===0){
    if(ratio>0.66){ for(let i=0;i<3;i++) bossBullet(b, aim+(i-1)*0.22, sp); }
    else if(ratio>0.33){ if(b.shotN%2===0){ for(let i=0;i<12;i++) bossBullet(b, i/12*TAU+b.t*0.001, sp*0.9); } else { for(let i=0;i<5;i++) bossBullet(b, aim+(i-2)*0.26, sp); } }
    else { if(b.shotN%3===0){ for(let i=0;i<18;i++) bossBullet(b, i/18*TAU+b.t*0.0015, sp); } else { for(let i=0;i<7;i++) bossBullet(b, aim+(i-3)*0.20, sp*1.05); } }
  } else if(b.kind===1){
    if(ratio>0.66){ for(let i=0;i<5;i++) bossBullet(b, aim+(i-2)*0.30, sp); }
    else if(ratio>0.33){ const a0=b.t*0.004; for(let k=0;k<2;k++) for(let j=0;j<3;j++) bossBullet(b, a0+k*Math.PI+j*0.18, sp*0.95); }
    else { for(let i=0;i<9;i++) bossBullet(b, aim+(i-4)*0.20, sp); if(b.shotN%2===0) for(let i=0;i<10;i++) bossBullet(b, i/10*TAU, sp*0.8); }
  } else {
    if(ratio>0.66){ const a=b.t*0.006; bossBullet(b,a,sp); bossBullet(b,a+Math.PI,sp); }
    else if(ratio>0.33){ const a=b.t*0.003; for(let k=0;k<4;k++) bossBullet(b, a+k*Math.PI/2, sp); if(b.shotN%2===1) for(let i=0;i<3;i++) bossBullet(b, aim+(i-1)*0.22, sp); }
    else { for(let i=0;i<18;i++) bossBullet(b, i/18*TAU+b.t*0.001, sp); if(b.shotN%3===0) for(let i=0;i<5;i++) bossBullet(b, aim+(i-2)*0.18, sp*1.1); }
  }
  SFX.enemyShoot();
}
function bossFireInterval(b){ const r=b.hp/b.maxhp;
  if(b.kind===2) return r>0.66?560 : r>0.33?640 : 540;
  if(b.kind===1) return r>0.66?1000 : r>0.33?760 : 560;
  return r>0.66?1100 : r>0.33?820 : 560;
}
function updateBoss(dt){
  const b=G.boss; b.t+=dt; if(b.flash>0) b.flash-=dt;
  if(!b.enterDone){ b.x-=0.12*dt; if(b.x<=b.tx){ b.x=b.tx; b.enterDone=true; } return; }
  if(b.kind===1){ b.y=H/2+Math.sin(b.t*0.0026)*(H*0.32); }
  else if(b.kind===2){ b.y=H/2+Math.sin(b.t*0.002)*(H*0.30); b.x=b.tx+Math.sin(b.t*0.001)*36; }
  else { b.y=H/2+Math.sin(b.t*0.0016)*(H*0.28); }
  b.fireT-=dt; if(b.fireT<=0){ bossAttack(b); b.fireT=bossFireInterval(b); }
}
function killBoss(){
  const b=G.boss; G.score+=5000; FX.shake(20); SFX.bigExplode();
  for(let i=0;i<7;i++) setTimeout(()=>FX.burst(b.x+(Math.random()-0.5)*90, b.y+(Math.random()-0.5)*80, rngPick(['#ffce4d','#ff6a4d','#fff']),20,5), i*110);
  G.boss=null; G.stage++; G.interT=CONFIG.interMs; G.stageT=0; G.warnT=0; G.spawnT=900;
  G.enemies=[]; G.ebullets=[]; G.lives=Math.min(5,G.lives+1); SFX.fanfare(); SFX.setBGMMode('play');
}

function update(dt){
  G.time+=dt; if(G.flash>0) G.flash-=dt;
  const p=G.p, w=G.weapon;

  for(const s of G.stars){ s.x-=s.spd*dt; if(s.x<0){ s.x=W; s.y=Math.random()*H; } }

  let vx=0,vy=0;
  if(Input.held('ArrowLeft')||Input.held('KeyA')) vx-=1;
  if(Input.held('ArrowRight')||Input.held('KeyD')) vx+=1;
  if(Input.held('ArrowUp')||Input.held('KeyW')) vy-=1;
  if(Input.held('ArrowDown')||Input.held('KeyS')) vy+=1;
  if(vx&&vy){ vx*=0.7071; vy*=0.7071; }
  const spd=CONFIG.baseSpeed + w.speed*CONFIG.speedStep;
  if(Touch.active){                                  // タッチ：指の位置へ追従（SPEED UPで速くなる）
    const maxStep=spd*dt*3.4;
    const dx=Touch.x-p.x, dy=Touch.y-p.y, d=Math.hypot(dx,dy);
    if(d>0.5){ const s=Math.min(d,maxStep); p.x+=dx/d*s; p.y+=dy/d*s; }
    p.x=clamp(p.x,16,W*CONFIG.zoneX); p.y=clamp(p.y,16,H-36);
  } else {                                            // キーボード
    p.x=clamp(p.x+vx*spd*dt, 16, W*CONFIG.zoneX);
    p.y=clamp(p.y+vy*spd*dt, 16, H-36);
  }
  if(p.invuln>0) p.invuln-=dt;

  G.trail.unshift({x:p.x,y:p.y}); if(G.trail.length>120) G.trail.pop();

  if(Input.pressed('KeyZ')) activatePowerUp();

  p.cool-=dt;                                        // 自動連射（スマホは移動だけに集中できる）
  if(p.cool<=0){ fireWeapons(); p.cool=(w.shot==='laser'?CONFIG.laserInterval:CONFIG.fireInterval); }
  if(w.missile){ p.missileCool-=dt; if(p.missileCool<=0){ fireMissile(); p.missileCool=CONFIG.missileInterval; } }

  if(G.interT>0){ G.interT-=dt; }                                  // ステージ切替の小休止
  else if(G.warnT>0){ G.warnT-=dt; if(G.warnT<=0) startBoss(); }    // ボス警告→出現
  else if(!G.boss){
    G.stageT+=dt; G.spawnT-=dt;
    if(G.spawnT<=0){ spawnEnemy(); G.spawnT=Math.max(240, 780 - G.stage*40)*(0.7+Math.random()*0.6); }
    if(G.stageT>=CONFIG.stageDuration){ G.warnT=CONFIG.warnMs; }    // 時間経過でボス警告
  }

  for(const b of G.bullets){ b.x+=b.vx*dt; b.y+=b.vy*dt; if(b.x>W+16||b.y<-12||b.y>H+12) b.dead=true; }
  for(const m of G.missiles){ m.x+=m.vx*dt; if(!m.grounded){ m.y+=m.vy*dt; if(m.y>=H-22){ m.y=H-22; m.grounded=true; } } if(m.x>W+16) m.dead=true; }
  for(const e of G.enemies){
    e.t+=dt; e.x-=e.spd*dt;
    if(e.pattern==='sine') e.y=e.baseY+Math.sin(e.t*0.005)*e.amp;
    else if(e.pattern==='dive'){ const dy=p.y-e.y; e.y+=clamp(dy,-1,1)*0.09*dt; }
    else if(e.pattern==='zigzag'){ e.y+=e.zvy*dt; if(e.y<e.baseY-e.amp){ e.y=e.baseY-e.amp; e.zvy=Math.abs(e.zvy); } else if(e.y>e.baseY+e.amp){ e.y=e.baseY+e.amp; e.zvy=-Math.abs(e.zvy); } }
    if(e.x<-30){ e.dead=true; continue; }
    if(e.shoots){ e.fireT-=dt; if(e.fireT<=0 && e.x<W-10){ enemyFire(e); e.fireT=(e.fireInt||1000)+randi(600); } }
  }
  for(const b of G.ebullets){ b.x+=b.vx*dt; b.y+=b.vy*dt; if(b.x<-12||b.x>W+12||b.y<-12||b.y>H+12) b.dead=true; }
  for(const c of G.caps){ c.t+=dt; c.x-=CONFIG.capSpeed*dt; if(c.x<-20) c.dead=true; }
  if(G.boss) updateBoss(dt);

  function dmgEnemy(e,b,px,py){ e.hp-=(b.dmg||1); FX.burst(px,py,'#ffe27a',4,2.5); if(e.hp<=0) killEnemy(e); }
  for(const b of G.bullets){ if(b.dead) continue;
    for(const e of G.enemies){ if(e.dead) continue;
      if(hitC(b.x,b.y,b.r||4, e.x,e.y,e.r)){ if(!b.laser) b.dead=true; dmgEnemy(e,b,b.x,b.y); break; } }
    if(!b.dead && G.boss && G.boss.enterDone && hitC(b.x,b.y,b.r||4, G.boss.x,G.boss.y,G.boss.r)){
      if(!b.laser) b.dead=true; G.boss.hp-=(b.dmg||1); G.boss.flash=80; G.score+=5; FX.burst(b.x,b.y,'#ffe27a',3,2.5);
      if(G.boss.hp<=0) killBoss(); }
  }
  for(const m of G.missiles){ if(m.dead) continue;
    for(const e of G.enemies){ if(e.dead) continue; if(hitC(m.x,m.y,7, e.x,e.y,e.r)){ m.dead=true; dmgEnemy(e,{dmg:1},m.x,m.y); break; } }
    if(!m.dead && G.boss && G.boss.enterDone && hitC(m.x,m.y,7, G.boss.x,G.boss.y,G.boss.r)){ m.dead=true; G.boss.hp--; G.boss.flash=60; G.score+=5; if(G.boss.hp<=0) killBoss(); }
  }
  for(const e of G.enemies){ if(e.dead) continue;
    if(hitC(p.x,p.y,p.r-2, e.x,e.y,e.r)){ if(e.type!=='carrier'){ e.dead=true; FX.burst(e.x,e.y,e.col,12,4); SFX.explode(); } playerHit(); break; } }
  if(G.boss && G.boss.enterDone && hitC(p.x,p.y,p.r-3, G.boss.x,G.boss.y,G.boss.r-10)) playerHit();
  for(const b of G.ebullets){ if(b.dead) continue; if(hitC(p.x,p.y,p.r-3, b.x,b.y,4)){ b.dead=true; playerHit(); break; } }
  for(const c of G.caps){ if(c.dead) continue;
    if(hitC(p.x,p.y,p.r+6, c.x,c.y,12)){ c.dead=true; w.meter=(w.meter+1)%SLOTS.length; G.score+=50; SFX.powerget(); FX.burst(c.x,c.y,'#ffd23f',12,3); } }

  G.bullets=G.bullets.filter(o=>!o.dead);
  G.missiles=G.missiles.filter(o=>!o.dead);
  G.ebullets=G.ebullets.filter(o=>!o.dead);
  G.enemies=G.enemies.filter(o=>!o.dead);
  G.caps=G.caps.filter(o=>!o.dead);
}

// ---------- drawing ----------
function drawStars(){ ctx.fillStyle='#9fb6ff'; for(const s of G.stars){ ctx.globalAlpha=s.sz===2?0.9:0.5; ctx.fillRect(s.x,s.y,s.sz,s.sz); } ctx.globalAlpha=1; }
function drawShipShape(){ ctx.beginPath(); ctx.moveTo(20,0); ctx.lineTo(2,-10); ctx.lineTo(-16,-10); ctx.lineTo(-10,0); ctx.lineTo(-16,10); ctx.lineTo(2,10); ctx.closePath(); }
function drawShip(x,y,blink){
  ctx.save(); ctx.translate(x,y);
  // 排気炎
  const fl=14+Math.random()*9; const g=ctx.createLinearGradient(-16,0,-16-fl,0);
  g.addColorStop(0,'#fff'); g.addColorStop(0.4,'#7fd0ff'); g.addColorStop(1,'rgba(60,120,255,0)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.moveTo(-15,-4); ctx.lineTo(-15-fl,0); ctx.lineTo(-15,4); ctx.closePath(); ctx.fill();
  if(blink) ctx.globalAlpha=0.4;
  // 尾翼
  ctx.fillStyle='#3f6bb0'; ctx.beginPath(); ctx.moveTo(-10,-2); ctx.lineTo(-20,-13); ctx.lineTo(-6,-2); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-10,2); ctx.lineTo(-20,13); ctx.lineTo(-6,2); ctx.closePath(); ctx.fill();
  // 主翼（後退翼）
  ctx.fillStyle='#5a86c8'; ctx.beginPath(); ctx.moveTo(4,-3); ctx.lineTo(-12,-19); ctx.lineTo(-4,-3); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(4,3); ctx.lineTo(-12,19); ctx.lineTo(-4,3); ctx.closePath(); ctx.fill();
  // 胴体
  ctx.fillStyle='#dcebff'; ctx.beginPath(); ctx.moveTo(23,0); ctx.lineTo(8,-5); ctx.lineTo(-15,-5); ctx.lineTo(-17,0); ctx.lineTo(-15,5); ctx.lineTo(8,5); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#9fc4ec'; ctx.beginPath(); ctx.moveTo(23,0); ctx.lineTo(8,5); ctx.lineTo(-15,5); ctx.lineTo(-17,0); ctx.closePath(); ctx.fill();
  // キャノピー
  ctx.fillStyle='#16335f'; ctx.beginPath(); ctx.ellipse(3,0,5.5,3,0,0,TAU); ctx.fill();
  ctx.fillStyle='#8fe0ff'; ctx.beginPath(); ctx.ellipse(4,-0.6,3,1.5,0,0,TAU); ctx.fill();
  // 機首
  ctx.fillStyle='#ff5a5a'; ctx.beginPath(); ctx.moveTo(23,0); ctx.lineTo(16,-2); ctx.lineTo(16,2); ctx.closePath(); ctx.fill();
  ctx.globalAlpha=1; ctx.restore();
}
function drawOption(o){ ctx.save(); ctx.translate(o.x,o.y); const k=0.6+0.4*Math.sin(clock()*0.01);
  ctx.fillStyle='rgba(255,170,60,'+k+')'; ctx.beginPath(); ctx.arc(0,0,8,0,TAU); ctx.fill();
  ctx.fillStyle='#fff7e0'; ctx.beginPath(); ctx.arc(0,0,3.4,0,TAU); ctx.fill(); ctx.restore(); }
function drawEnemy(e){
  ctx.save(); ctx.translate(e.x,e.y); const r=e.r, wing=e.wing||'#2c3a55';
  if(e.type==='carrier'){ const pulse=0.6+0.4*Math.sin(e.t*0.012); ctx.strokeStyle='rgba(255,77,109,'+pulse+')'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,r+6,0,TAU); ctx.stroke(); }
  // 主翼
  ctx.fillStyle=wing;
  ctx.beginPath(); ctx.moveTo(r*0.45,-r*0.15); ctx.lineTo(r*1.05,-r*0.95); ctx.lineTo(r*0.1,-r*0.18); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(r*0.45, r*0.15); ctx.lineTo(r*1.05, r*0.95); ctx.lineTo(r*0.1, r*0.18); ctx.closePath(); ctx.fill();
  // 胴体（機首は左 -x）
  ctx.fillStyle=e.col; ctx.beginPath(); ctx.moveTo(-r*1.35,0); ctx.lineTo(-r*0.4,-r*0.42); ctx.lineTo(r*0.9,-r*0.34); ctx.lineTo(r*1.15,0); ctx.lineTo(r*0.9,r*0.34); ctx.lineTo(-r*0.4,r*0.42); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.28)'; ctx.beginPath(); ctx.moveTo(-r*1.35,0); ctx.lineTo(r*0.9,r*0.34); ctx.lineTo(r*1.15,0); ctx.closePath(); ctx.fill();
  // キャノピー
  ctx.fillStyle='#0b1020'; ctx.beginPath(); ctx.ellipse(-r*0.45,0,r*0.3,r*0.2,0,0,TAU); ctx.fill();
  ctx.fillStyle='#ff5a5a'; ctx.beginPath(); ctx.ellipse(-r*0.5,-r*0.05,r*0.14,r*0.09,0,0,TAU); ctx.fill();
  // 尾翼
  ctx.fillStyle=wing; ctx.beginPath(); ctx.moveTo(r*0.8,0); ctx.lineTo(r*1.2,-r*0.55); ctx.lineTo(r*0.6,-r*0.08); ctx.closePath(); ctx.fill();
  // タイプ別アクセント
  if(e.type==='gunner'){ ctx.fillStyle='#ffcf6b'; ctx.fillRect(-r*1.55,-r*0.16,r*0.55,r*0.32); }
  if(e.type==='spinner'){ ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,r*0.55,e.t*0.012,e.t*0.012+4.2); ctx.stroke(); }
  if(e.type==='bomber'||e.type==='carrier'){ ctx.fillStyle='#ff9f4d'; ctx.beginPath(); ctx.arc(r*1.05,-r*0.32,r*0.2,0,TAU); ctx.fill(); ctx.beginPath(); ctx.arc(r*1.05,r*0.32,r*0.2,0,TAU); ctx.fill(); }
  ctx.restore();
}
function drawBoss(b){
  ctx.save(); ctx.translate(b.x,b.y);
  const body = b.flash>0?'#ffe0e0':b.col, k=0.5+0.5*Math.sin(b.t*0.01);
  if(b.kind===0){
    ctx.fillStyle=body; ctx.beginPath(); ctx.moveTo(-b.r,0); ctx.lineTo(-b.r*0.3,-b.r*0.75); ctx.lineTo(b.r,-b.r*0.7); ctx.lineTo(b.r*0.7,0); ctx.lineTo(b.r,b.r*0.7); ctx.lineTo(-b.r*0.3,b.r*0.75); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#2a2140'; ctx.fillRect(b.r*0.2,-b.r*0.5,b.r*0.7,b.r);
    ctx.globalAlpha=0.55+0.45*k; ctx.fillStyle=b.core; ctx.beginPath(); ctx.arc(-b.r*0.25,0,16,0,TAU); ctx.fill(); ctx.globalAlpha=1;
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-b.r*0.25,0,6,0,TAU); ctx.fill();
  } else if(b.kind===1){
    ctx.fillStyle=body;
    ctx.beginPath(); ctx.ellipse(0,0,b.r*0.7,b.r*0.5,0,0,TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(-b.r*0.1,-b.r*0.72,b.r*0.42,0,TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(-b.r*0.1, b.r*0.72,b.r*0.42,0,TAU); ctx.fill();
    ctx.globalAlpha=0.5+0.5*k; ctx.fillStyle=b.core;
    ctx.beginPath(); ctx.arc(-b.r*0.1,-b.r*0.72,8,0,TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(-b.r*0.1, b.r*0.72,8,0,TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(-b.r*0.15,0,7,0,TAU); ctx.fill(); ctx.globalAlpha=1;
  } else {
    ctx.fillStyle=body; ctx.beginPath(); ctx.arc(0,0,b.r,0,TAU); ctx.fill();
    ctx.strokeStyle='rgba(255,210,63,'+(0.4+0.4*k)+')'; ctx.lineWidth=5;
    for(let s=0;s<6;s++){ const a=b.t*0.002 + s*TAU/6; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*b.r,Math.sin(a)*b.r); ctx.stroke(); }
    ctx.globalAlpha=0.6+0.4*k; ctx.fillStyle=b.core; ctx.beginPath(); ctx.arc(0,0,15,0,TAU); ctx.fill(); ctx.globalAlpha=1;
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(0,0,6,0,TAU); ctx.fill();
  }
  ctx.restore();
}

function render(){
  clearBG();
  if(G) drawStars();
  if(state==='title'){ renderTitle(); return; }

  FX.preDraw();
  for(const c of G.caps){ const k=0.6+0.4*Math.sin(c.t*0.01);
    ctx.fillStyle='rgba(255,210,63,'+k+')'; ctx.strokeStyle='#fff8'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(c.x,c.y,11,0,TAU); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#5a3b00'; ctx.font='bold 12px "Segoe UI"'; ctx.textAlign='center'; ctx.fillText('P',c.x,c.y+4); }
  for(const e of G.enemies) drawEnemy(e);
  if(G.boss) drawBoss(G.boss);
  for(const o of optionPositions()) drawOption(o);
  for(const m of G.missiles){ ctx.fillStyle='#ffcf6b'; ctx.beginPath(); ctx.moveTo(m.x+6,m.y); ctx.lineTo(m.x-5,m.y-5); ctx.lineTo(m.x-5,m.y+5); ctx.closePath(); ctx.fill(); }
  for(const b of G.bullets){ if(b.laser){ ctx.fillStyle='#aef6ff'; ctx.fillRect(b.x-18,b.y-3,36,6); ctx.fillStyle='#fff'; ctx.fillRect(b.x-18,b.y-1,36,2); } else { ctx.fillStyle='#ffe27a'; ctx.fillRect(b.x-6,b.y-1.8,12,3.6); } }
  for(const b of G.ebullets){ ctx.fillStyle='#ff7a4d'; ctx.beginPath(); ctx.arc(b.x,b.y,5,0,TAU); ctx.fill(); ctx.fillStyle='#ffd2b0'; ctx.beginPath(); ctx.arc(b.x,b.y,2,0,TAU); ctx.fill(); }
  if(!(G.p.invuln>0 && (clock()/80|0)%2===0)) drawShip(G.p.x,G.p.y, G.p.invuln>0);
  FX.postDraw();
  if(G.flash>0){ ctx.fillStyle='rgba(255,60,60,'+(G.flash/180*0.35)+')'; ctx.fillRect(0,0,W,H); }

  if(G.boss) renderBossBar();
  renderHUD();
  renderPowerMeter();
  renderBanner();

  if(state==='pause') overlay('PAUSE','#7ec8ff','P キーで再開','（ポーズ中  ↑↑↓↓←→←→AB  ？）');
  if(state==='over'){
    if(G.win) overlay('STAGE CLEAR!','#7CFC00','スペース / クリックでもう一度','SCORE '+G.score+'   BEST '+Store.get());
    else overlay('GAME OVER','#ff6a6a','スペース / クリックで再挑戦','STAGE '+G.stage+'　SCORE '+G.score+'　BEST '+Store.get());
  }
}

function renderBossBar(){
  const b=G.boss, bw=W*0.56, bx=(W-bw)/2, by=66;
  ctx.fillStyle='#311'; ctx.fillRect(bx,by,bw,12); ctx.fillStyle=b.core; ctx.fillRect(bx,by,bw*clamp(b.hp/b.maxhp,0,1),12);
  ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,12);
  ctx.fillStyle='#ffd6e0'; ctx.font='bold 12px "Segoe UI"'; ctx.textAlign='center'; ctx.fillText('STAGE '+G.stage+' BOSS  「'+b.name+'」', W/2, by-5);
}
function renderBanner(){
  if(G.warnT>0){ const bl=(clock()/130|0)%2===0; ctx.textAlign='center';
    ctx.fillStyle=bl?'#ff4d4d':'#5a1414'; ctx.font='bold 46px "Segoe UI"'; ctx.fillText('!!  W A R N I N G  !!', W/2, H/2-8);
    ctx.fillStyle='#ffb0b0'; ctx.font='16px "Segoe UI"'; ctx.fillText('ボス接近', W/2, H/2+26); ctx.textAlign='left'; }
  else if(G.interT>0){ ctx.textAlign='center';
    ctx.fillStyle='#7CFC00'; ctx.font='bold 32px "Segoe UI"'; ctx.fillText('STAGE '+(G.stage-1)+' CLEAR!', W/2, H/2-20);
    ctx.fillStyle='#39d0ff'; ctx.font='bold 44px "Segoe UI"'; ctx.fillText('STAGE '+G.stage, W/2, H/2+30); ctx.textAlign='left'; }
}
function renderHUD(){
  ctx.textAlign='left';
  ctx.fillStyle='#ffe27a'; ctx.font='bold 20px "Segoe UI"'; ctx.fillText('SCORE '+G.score, 16, 28);
  ctx.fillStyle='#9fb0e8'; ctx.font='14px "Segoe UI"'; ctx.fillText('BEST '+Store.get(), 16, 48);
  ctx.fillStyle='#bcd'; ctx.font='bold 15px "Segoe UI"'; ctx.fillText('STAGE '+G.stage, 130, 28);
  if(!G.boss && G.interT<=0 && G.warnT<=0){ const pr=clamp(G.stageT/CONFIG.stageDuration,0,1); ctx.fillStyle='#26304a'; ctx.fillRect(130,38,96,8); ctx.fillStyle='#39d0ff'; ctx.fillRect(130,38,96*pr,8); }
  for(let i=0;i<Math.max(0,G.lives);i++){ ctx.save(); ctx.translate(340+i*26, 22); ctx.scale(0.7,0.7);
    ctx.fillStyle='#bfe6ff'; drawShipShape(); ctx.fill(); ctx.restore(); }
  ctx.fillStyle=SFX.on?'#7CFC00':'#888'; ctx.font='14px "Segoe UI"'; ctx.fillText((SFX.on?'♪ON':'♪OFF')+' (M)', W-86, 28);
}
function renderPowerMeter(){
  const w=G.weapon, n=SLOTS.length, cw=112, gap=6, total=n*cw+(n-1)*gap, bx=(W-total)/2, by=H-32, ch=24;
  ctx.font='bold 12px "Segoe UI"'; ctx.textAlign='center';
  for(let i=0;i<n;i++){
    const x=bx+i*(cw+gap); let equipped=false;
    if(i===0) equipped=w.speed>0; else if(i===1) equipped=w.missile; else if(i===2) equipped=w.shot==='double'; else if(i===3) equipped=w.shot==='laser'; else equipped=w.options>0;
    const hi = i===w.meter;
    rrectFill(x,by,cw,ch,5, hi?'#ff7a1c':(equipped?'#1d3a24':'#141a2e'));
    ctx.strokeStyle = hi?'#ffd23f':(equipped?'#3fae5a':'#2c3650'); ctx.lineWidth=hi?2:1; ctx.stroke();
    if(hi && (clock()/250|0)%2===0){ ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke(); }
    let lbl=SLOT_SHORT[i];
    if(i===0 && w.speed>0) lbl='SPEED×'+w.speed;
    if(i===4 && w.options>0) lbl='OPTION×'+w.options;
    ctx.fillStyle = hi?'#1a1200':(equipped?'#bff0c8':'#7a86a8'); ctx.fillText(lbl, x+cw/2, by+16);
  }
  ctx.textAlign='left';
}
function rrectFill(x,y,w,h,r,fill){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); ctx.fillStyle=fill; ctx.fill(); }

function renderTitle(){
  ctx.textAlign='center';
  ctx.fillStyle='#bfe6ff'; ctx.font='bold 64px "Segoe UI"'; ctx.fillText('GRADIUS-LIKE', W/2, 150);
  ctx.fillStyle='#39d0ff'; ctx.font='bold 24px "Segoe UI"'; ctx.fillText('グラディウス風 シューティング v08（戦闘機＆全8敵種）', W/2, 188);
  drawShip(W/2-220, 268, false);
  const info=[
    '← ↑ → ↓ / WASD … 移動 ／ Space … ショット（通常2連射）',
    '敵が落とす「P」でゲージが進み、Z で装備を発動',
    'DOUBLE=3方向 ／ LASER=貫通 ／ OPTION=分身（最大4体）',
    'ステージ終盤にボス出現！倒すと次ステージへ（ボス3種ローテ）',
  ];
  ctx.font='17px "Segoe UI"'; ctx.fillStyle='#bcd'; info.forEach((t,i)=>ctx.fillText(t, W/2, 330+i*30));
  ctx.font='14px "Segoe UI"'; ctx.fillStyle='#8aa'; ctx.fillText('ステージ制：ボスを倒すたびに次ステージ（敵が強化）', W/2, 470);
  const blink=(clock()/500|0)%2===0; ctx.fillStyle=blink?'#ffe27a':'#566'; ctx.font='bold 26px "Segoe UI"';
  ctx.fillText('スペース / クリックでスタート', W/2, 520);
  ctx.fillStyle='#778'; ctx.font='13px "Segoe UI"'; ctx.fillText('BEST '+Store.get(), W/2, 556);
}

function onKey(code){
  if(code==='KeyM'){ SFX.toggle(); return; }
  if(code==='KeyR'){ startGame(); return; }
  if(state==='title'||state==='over'){ if(code==='Space'||code==='Enter') startGame(); return; }
  if(code==='KeyP'){ state = state==='play'?'pause':'play'; if(state==='pause') konamiIdx=0; return; }
  if(state==='pause'){            // 裏コマンド入力
    if(code===KONAMI[konamiIdx]){ konamiIdx++; if(konamiIdx>=KONAMI.length){ konamiIdx=0; applyMaxPower(); } }
    else { konamiIdx = (code===KONAMI[0])?1:0; }
    return;
  }
}
function gameOver(){ state='over'; G.win=false; SFX.stopBGM(); SFX.lose(); FX.shake(14); if(G.score>Store.get()) Store.set(G.score); }
function startGame(){ newGame(); state='play'; konamiIdx=0; SFX.startBGM('play'); }

// 画面ボタン（スマホ用）
document.getElementById('btnPow').addEventListener('click', ()=>{ SFX.ensure();
  if(state==='play') activatePowerUp(); else startGame(); });
document.getElementById('btnPause').addEventListener('click', ()=>{
  if(state==='play'){ state='pause'; konamiIdx=0; } else if(state==='pause') state='play'; });
document.getElementById('btnSound').addEventListener('click', ()=> SFX.toggle());
document.getElementById('btnRestart').addEventListener('click', ()=>{ SFX.ensure(); startGame(); });

newGame();
state='title';
requestAnimationFrame(loop);
</script>
